<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Augustus Yuan</title>
  <script>
    // GitHub Pages SPA redirect: converts the path to a query string
    // so index.html can pick it up and let React Router handle it.
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/' + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
